name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Code style — fast fail before spending time on tests
  # ──────────────────────────────────────────────────────────────
  spotless:
    name: Code Style (Spotless)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Check formatting
        run: mvn -B spotless:check

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build, test, coverage
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: spotless
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & Unit Tests
        run: mvn -B clean verify -DskipITs

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            **/target/site/jacoco/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # Job 3: Integration tests (separate job, can be slow)
  # ──────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sieve
          POSTGRES_USER: sieve
          POSTGRES_PASSWORD: sieve
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sieve"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run integration tests
        run: mvn -B verify -DskipUnitTests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sieve
          SPRING_DATASOURCE_USERNAME: sieve
          SPRING_DATASOURCE_PASSWORD: sieve

      - name: Upload IT results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            **/target/failsafe-reports/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # Job 4: Docker build (verify it compiles, don't push)
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sieve-aml:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
