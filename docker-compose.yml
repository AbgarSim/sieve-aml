services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sieve
      POSTGRES_USER: sieve
      POSTGRES_PASSWORD: sieve
    ports:
      - "5432:5432"
    volumes:
      - sieve-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sieve -d sieve"]
      interval: 5s
      timeout: 5s
      retries: 5

  sieve-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sieve
      POSTGRES_USER: sieve
      POSTGRES_PASSWORD: sieve
      SIEVE_ADDRESS_LIBPOSTAL_ENABLED: "true"
      SIEVE_ADDRESS_LIBPOSTAL_DATA_DIR: /opt/libpostal-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sieve-pgdata:
